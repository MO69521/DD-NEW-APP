# 推送到 main 后自动构建 Flutter Web 并部署到 Vercel 固定预览地址。
#
# 首次配置（只需一次）：
#   bash scripts/setup_vercel_ci.sh
# 按脚本提示在 GitHub 仓库 Settings → Secrets and variables → Actions 添加：
#   VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
#
# 固定预览地址：https://diandian-preview.vercel.app

name: Deploy Preview

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'vercel.json'
      - '.github/workflows/deploy-preview.yml'
  workflow_dispatch:

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy:
    # 仅在真正的 GitHub 上运行（GitHub→Vercel 预览部署）。
    # 自建服务（Gitea/GitLab，github.server_url 非 github.com）自动跳过，避免红叉。
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_MAIN: lib/previews/global_preview_main.dart
      PREVIEW_URL: https://diandian-preview.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web preview
        run: flutter build web -t "$PREVIEW_MAIN" --release

      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build/web
          vercel-args: '--prod'

      - name: Summary
        run: |
          echo "### Preview deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production: ${{ env.PREVIEW_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy URL: ${{ steps.vercel.outputs.preview-url }}" >> "$GITHUB_STEP_SUMMARY"
